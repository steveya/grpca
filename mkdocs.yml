site_name: grpca
site_description: Graph-Regularized PCA — sklearn-compatible estimator with two-sided Laplacian penalties
site_url: https://grpca.readthedocs.io
repo_url: https://github.com/steveya/grpca
repo_name: steveya/grpca

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/steveya/grpca

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Theory: theory.md
  - User Guide:
      - Basic Usage: user-guide/basic-usage.md
      - Cross-Validation: user-guide/cross-validation.md
      - Graph Construction: user-guide/graphs.md
      - Missing Data: user-guide/missing-data.md
      - Rolling Windows: user-guide/rolling-windows.md
      - Diagnostics: user-guide/diagnostics.md
  - API Reference:
      - Estimator: api/estimator.md
      - Graphs: api/graphs.md
      - Metrics: api/metrics.md
      - Splitters: api/splitters.md
      - Diagnostics: api/diagnostics.md
      - Inference: api/inference.md
  - Changelog: changelog.md
