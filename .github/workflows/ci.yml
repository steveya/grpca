name: CI

on:
  pull_request:
    paths:
      - "grpca/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main, master]
    paths:
      - "grpca/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  # ---- Lint & type-check ---------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check grpca/ tests/
      - name: Ruff format
        run: ruff format --check grpca/ tests/
      - name: Mypy
        run: mypy grpca/

  # ---- Tests (matrix) ------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run tests with coverage
        run: pytest tests/ --cov=grpca --cov-report=xml --tb=short -q
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ---- Docs build ----------------------------------------------------------
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]
      - name: Build docs
        run: mkdocs build --strict
